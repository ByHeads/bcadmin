appId: com.byheads.bcadmin
productName: Broadcaster Administrator
copyright: Copyright (c) 2026 ByHeads

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - "!out/**/*.map"

asarUnpack:
  - "node_modules/electron-updater/**"

publish:
  provider: github
  owner: ByHeads
  repo: bcadmin

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

dmg:
  sign: true
  artifactName: "${productName}-${version}-${arch}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "${productName}-${version}-setup.${ext}"
  signingHashAlgorithms:
    - sha256

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

msi:
  oneClick: false
  perMachine: true
  artifactName: "${productName}-${version}-${arch}.${ext}"

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  icon: build/icon.png
  category: Development
  artifactName: "${productName}-${version}-${arch}.${ext}"

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0

appImage:
  artifactName: "${productName}-${version}-${arch}.${ext}"
